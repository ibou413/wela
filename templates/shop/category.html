{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-gray-900">{{ category.name|default:"Catégorie" }}</h1>
        <p class="mt-2 text-lg text-gray-600">{{ category.description|default:"" }}</p>
    </div>
</div>

<div class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        {% for product in products %}
            {% include 'shop/includes/product_card.html' %}
        {% empty %}
        <div class="col-span-full text-center">
            <p class="text-gray-500">Aucun produit dans cette catégorie.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
